align-items:center;text-align:center}.logo-main{width:300px;max-width:92%;object-fit:cover;filter:drop-shadow(0 0 22px rgba(192,132,252,.95)) drop-shadow(0 0 70px rgba(82,36,132,.9));animation:pulse 3.2s ease-in-out infinite}@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.035)}}.welcome{font-size:15px;letter-spacing:7px;color:#cdb2f7;margin:16px 0 12px}.title{font-family:Cinzel,serif;font-size:52px;line-height:.9;letter-spacing:5px;font-weight:700;text-shadow:0 0 26px rgba(192,132,252,.55)}.sub-title{font-family:Cinzel,serif;font-size:24px;font-weight:400;letter-spacing:13px;color:#dcc3ff;margin:8px 0 16px}.tagline{color:var(--muted);font-size:18px;margin-bottom:36px}.btn{width:100%;border:0;border-radius:20px;min-height:62px;padding:16px 18px;margin:8px 0;color:#fff;font-weight:900;letter-spacing:.7px;font-size:17px;cursor:pointer;transition:.2s;background:rgba(255,255,255,.07);border:1px solid var(--border);backdrop-filter:blur(14px)}.btn:active{transform:scale(.98)}.primary{background:linear-gradient(135deg,#472064,#7130a6);box-shadow:0 0 32px rgba(124,58,237,.35)}.secondary{background:rgba(255,255,255,.06)}.mp{background:linear-gradient(135deg,#00a7e8,#0075c9);border:0}.back{align-self:flex-start;background:rgba(255,255,255,.08);width:auto;min-height:auto;padding:11px 15px;border-radius:999px;margin-bottom:18px}.card{background:linear-gradient(180deg,rgba(31,17,50,.86),rgba(13,8,23,.88));border:1px solid var(--border);border-radius:26px;padding:18px;box-shadow:0 18px 60px rgba(0,0,0,.35);backdrop-filter:blur(18px);margin:10px 0}.header h1{font-family:Cinzel,serif;font-size:32px;letter-spacing:2px}.header p{color:var(--muted);margin-top:8px}.sector-card{min-height:130px;text-align:left;font-size:28px;display:flex;flex-direction:column;justify-content:center;position:relative;padding-right:52px}.sector-card small{display:block;font-size:14px;color:var(--muted);margin-top:8px;text-transform:uppercase;letter-spacing:1px}.sector-card:after{content:" .admin-menu{display:grid;gap:12px;margin-top:14px}.admin-big{min-height:110px;font-size:22px;text-align:left;display:flex;flex-direction:column;justify-content:center}.admin-big small{display:block;color:var(--muted);font-size:13px;margin-top:7px}.admin-datebar{display:flex;gap:8px;align-items:center;width:100%;margin:10px 0 14px;flex-wrap:wrap}.admin-datebar input{flex:1;min-width:170px}.pro-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%}.pro-btn{min-height:54px}.whats-client{background:linear-gradient(135deg,#15803d,#22c55e)!important}.prof-pill{display:inline-block;margin-top:8px;padding:7px 10px;border-radius:999px;background:rgba(192,132,252,.16);border:1px solid rgba(192,132,252,.3);color:#eadcff;font-weight:900;font-size:12px}.count-badge{float:right;background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);border-radius:999px;padding:5px 9px;font-size:13px}

.admin-calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:7px;width:100%;margin-top:10px}
.cal-head{font-size:11px;color:#cdb2f7;text-align:center;font-weight:900;opacity:.85}
.cal-day{min-height:42px;border-radius:13px;border:1px solid rgba(192,132,252,.22);background:rgba(255,255,255,.055);color:#fff;font-weight:900;font-size:13px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer}
.cal-day .cal-count{font-size:11px;color:#d8b4fe;font-weight:900}
.cal-day.selected{background:linear-gradient(135deg,#472064,#7130a6);box-shadow:0 0 18px rgba(124,58,237,.35)}
.cal-day.empty-day{opacity:0;pointer-events:none}
.cal-day.full{border-color:rgba(239,68,68,.55);background:rgba(127,29,29,.25)}
.month-title{font-family:Cinzel,serif;font-size:18px;letter-spacing:1px;text-align:center;flex:1}
.month-nav{display:flex;align-items:center;gap:8px;width:100%;margin:8px 0}
.month-nav .btn{width:auto;min-height:42px;margin:0;padding:9px 13px}

function copyAlias(){
  const done=()=>alert('Alias copiado');
  if(navigator.clipboard && window.isSecureContext){
    navigator.clipboard.writeText(ALIAS).then(done).catch(()=>fallbackCopyAlias());
  }else{
    fallbackCopyAlias();
  }
}
function fallbackCopyAlias(){
  const temp=document.createElement('textarea');
  temp.value=ALIAS;
  temp.setAttribute('readonly','');
  temp.style.position='fixed';
  temp.style.opacity='0';
  document.body.appendChild(temp);
  temp.select();
  temp.setSelectionRange(0,99999);
  try{document.execCommand('copy'); alert('Alias copiado');}
  catch(e){prompt('Copiá el alias:',ALIAS);}
  document.body.removeChild(temp);
}

    const selected=date===state.adminDate;
    const full=count>=18;
    return `<button class="cal-day ${selected?'selected':''} ${full?'full':''}" onclick="set({adminDate:'${date}'})"><span>${i+1}</span>${count?`<span class="cal-count">(${count})</span>`:''}</button>`;
  }).join('');
  const label=first.toLocaleDateString('es-AR',{month:'long',year:'numeric'});
  return `<div class="card admin-datebar"><div class="month-nav"><button class="btn secondary" onclick="moveMonth(-1)">◀</button><div class="month-title">${label}</div><button class="btn secondary" onclick="moveMonth(1)">▶</button><button class="btn primary" onclick="todayAdmin()">HOY</button></div><div class="admin-calendar">${names.map(n=>`<div class="cal-head">${n}</div>`).join('')}${blanks}${dayBtns}</div></div>`
}
function todayAdmin(){const today=new Date().toISOString().slice(0,10);state.adminDate=today;state.adminMonth=today.slice(0,7);render()}
function moveMonth(delta){const [y,m]=state.adminMonth.split('-').map(Number);const d=new Date(y,m-1+delta,1);state.adminMonth=d.toISOString().slice(0,7);render()}
function countTurnsDate(fecha){return state.turnos.filter(t=>t.fecha===fecha&&t.estado!=='Finalizado').length}
function getProfesional(t){
  if(!t) return '';
  if(t.sector==='Barbería') return 'Federico';
  const servicio=String(t.servicio||'');
  if(servicio.toLowerCase().startsWith('melisa')) return 'Melisa';
  if(servicio.toLowerCase().startsWith('myriam')) return 'Myriam';
  return t.profesional || t.professional || '';
}
function telClean(tel){
  let n=String(tel||'').replace(/\D/g,'');
  if(!n) return '';
  if(n.startsWith('00')) n=n.slice(2);
  if(n.startsWith('549')) return n;
  if(n.startsWith('54')) return '549'+n.slice(2).replace(/^0/,'');
  if(n.startsWith('0')) n=n.slice(1);
  return '549'+n;
}
function openClientWhats(tel,nombre,fecha,hora){
  const phone=telClean(tel);
  const msg=`Hola ${nombre}, te escribimos de FESSA por tu turno del ${fecha} a las ${hora}.`;
  if(!phone) return alert('El cliente no tiene teléfono cargado');
  window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`,'_blank');
}
function countTurns(sector,pro,fecha){return state.turnos.filter(t=>t.fecha===fecha&&t.sector===sector&&getProfesional(t)===pro&&t.estado!=='Finalizado').length}
function adminColorMenu(){const mel=countTurns('Colorista / Peluquería','Melisa',state.adminDate), my=countTurns('Colorista / Peluquería','Myriam',state.adminDate);return `${bg()}<main class="screen admin"><div class="admin-top"><button class="btn back" onclick="state.adminView='home';render()">← Volver</button><h1 class="admin-title">Colorista / Peluquería</h1></div>${dateBar()}<div class="admin-menu"><button class="btn primary admin-big" onclick="state.adminView='stylist';state.adminStylist='Melisa';render()">MELISA <span class="count-badge">${mel}</span><small>Ver turnos de Melisa</small></button><button class="btn primary admin-big" onclick="state.adminView='stylist';state.adminStylist='Myriam';render()">MYRIAM <span class="count-badge">${my}</span><small>Ver turnos de Myriam</small></button></div></main>`}
function adminList(sector,pro){const list=state.turnos.filter(t=>t.fecha===state.adminDate&&t.sector===sector&&getProfesional(t)===pro&&t.estado!=='Finalizado');return `${bg()}<main class="screen admin"><div class="admin-top"><button class="btn back" onclick="state.adminView='${sector==='Barbería'?'home':'colorMenu'}';render()">← Volver</button><h1 class="admin-title">${sector==='Barbería'?'💈 Barbería':'💇‍♀️ '+pro}</h1></div>${dateBar()}<div class="card admin-box"><h2>${pro} · ${state.adminDate}</h2>${list.map(turnoHtml).join('')||'<p class="empty">Sin turnos para esta fecha</p>'}</div></main>`}
function turnoHtml(t){const esColor=t.sector==='Colorista / Peluquería';const id=jsArg(t.id);return `<div class="turno"><h3>${t.hora} · ${t.nombre}</h3><p>📱 ${t.telefono}</p><p>✂️ ${t.servicio}</p><p>📅 ${t.fecha}</p><p>💳 ${t.pago||'-'}</p>${esColor?`<p>💰 Seña: <b class="${t.sena_pagada?'sena-ok':'sena-pend'}">${t.sena_pagada?'Recibida':'Pendiente'}</b></p>`:''}<span class="estado">${t.estado}</span><div class="actions"><button class="btn blue" onclick="openClientWhats(telClean('${t.telefono}'),'${t.nombre}','${t.fecha}','${t.hora}')">WhatsApp</button><button class="btn success" onclick="updateEstado(${id},'Confirmado')">Confirmar</button>${esColor?`<button class="btn secondary" onclick="updateSena(${id},true)">Seña recibida</button>`:''}<button class="btn secondary" onclick="updateEstado(${id},'Finalizado')">Finalizar</button><button class="btn danger" onclick="deleteTurno(${id})">Cancelar</button></div></div>`}
function render(){const el=document.getElementById('app'); if(state.screen==='home')el.innerHTML=home(); if(state.screen==='sector')el.innerHTML=sector(); if(state.screen==='services')el.innerHTML=services(); if(state.screen==='booking')el.innerHTML=booking(); if(state.screen==='mis')el.innerHTML=mis(); if(state.screen==='admin')el.innerHTML=admin();}
loadTurnos(); render();
</script>
</body>
</html>
